<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Web Synth</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section class="topbar">
      <h1>Web Synth</h1>
      <button id="open-cc-map" type="button">MIDI CC Map</button>
    </section>

    <main class="app">
      <section class="panel">
        <h2>System</h2>
        <div class="row">
          <button id="start-audio" type="button">Start Audio</button>
          <span id="audio-status">Audio: locked</span>
        </div>
        <div class="row">
          <label for="midi-channel">MIDI Channel</label>
          <select id="midi-channel">
            <option value="all" selected>All</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
            <option value="16">16</option>
          </select>
        </div>
        <p id="midi-status">MIDI: checking...</p>
        <p id="midi-clock-status">Clock: waiting for ticks</p>
      </section>

      <section class="panel">
        <h2>Oscillator 1</h2>
        <fieldset>
          <div class="radio-row">
            <label
              ><input type="radio" name="osc1-wave" data-param="osc1Wave" value="sine" />
              Sine</label
            >
            <label
              ><input
                type="radio"
                name="osc1-wave"
                data-param="osc1Wave"
                value="triangle"
                checked
              />
              Triangle</label
            >
            <label
              ><input type="radio" name="osc1-wave" data-param="osc1Wave" value="sawtooth" />
              Sawtooth</label
            >
            <label
              ><input type="radio" name="osc1-wave" data-param="osc1Wave" value="square" />
              Square</label
            >
          </div>

          <label for="osc1-octave">Octave</label>
          <output id="osc1-octave-value">0</output>
          <input
            id="osc1-octave"
            data-param="osc1Octave"
            type="range"
            min="-2"
            max="2"
            step="1"
            value="0"
          />

          <label for="osc1-detune">Detune (cents)</label>
          <output id="osc1-detune-value">0</output>
          <input
            id="osc1-detune"
            data-param="osc1Detune"
            type="range"
            min="-50"
            max="50"
            step="1"
            value="0"
          />

          <label for="osc1-level">Level</label>
          <output id="osc1-level-value">0.50</output>
          <input
            id="osc1-level"
            data-param="osc1Level"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.5"
          />
        </fieldset>
      </section>

      <section class="panel">
        <h2>Oscillator 2</h2>
        <fieldset>
          <div class="radio-row">
            <label
              ><input type="radio" name="osc2-wave" data-param="osc2Wave" value="sine" />
              Sine</label
            >
            <label
              ><input type="radio" name="osc2-wave" data-param="osc2Wave" value="triangle" />
              Triangle</label
            >
            <label
              ><input
                type="radio"
                name="osc2-wave"
                data-param="osc2Wave"
                value="sawtooth"
                checked
              />
              Sawtooth</label
            >
            <label
              ><input type="radio" name="osc2-wave" data-param="osc2Wave" value="square" />
              Square</label
            >
          </div>

          <label for="osc2-octave">Octave</label>
          <output id="osc2-octave-value">0</output>
          <input
            id="osc2-octave"
            data-param="osc2Octave"
            type="range"
            min="-2"
            max="2"
            step="1"
            value="0"
          />

          <label for="osc2-detune">Detune (cents)</label>
          <output id="osc2-detune-value">0</output>
          <input
            id="osc2-detune"
            data-param="osc2Detune"
            type="range"
            min="-50"
            max="50"
            step="1"
            value="0"
          />

          <label for="osc2-level">Level</label>
          <output id="osc2-level-value">0.50</output>
          <input
            id="osc2-level"
            data-param="osc2Level"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.5"
          />
        </fieldset>
      </section>

      <section class="panel">
        <h2>Filter</h2>
        <fieldset>
          <label for="filter-cutoff">Cutoff</label>
          <output id="filter-cutoff-value">109</output>
          <input
            id="filter-cutoff"
            data-param="filterCutoff"
            type="range"
            min="0"
            max="127"
            step="1"
            value="109"
          />

          <label for="filter-q">Resonance</label>
          <output id="filter-q-value">4</output>
          <input
            id="filter-q"
            data-param="filterQ"
            type="range"
            min="0"
            max="127"
            step="1"
            value="4"
          />
        </fieldset>
      </section>

      <section class="panel">
        <h2>Envelope</h2>
        <fieldset>
          <label for="env-attack">Attack (s)</label>
          <output id="env-attack-value">1</output>
          <input
            id="env-attack"
            data-param="attack"
            type="range"
            min="0"
            max="127"
            step="1"
            value="1"
          />

          <label for="env-decay">Decay (s)</label>
          <output id="env-decay-value">13</output>
          <input
            id="env-decay"
            data-param="decay"
            type="range"
            min="0"
            max="127"
            step="1"
            value="13"
          />

          <label for="env-sustain">Sustain</label>
          <output id="env-sustain-value">89</output>
          <input
            id="env-sustain"
            data-param="sustain"
            type="range"
            min="0"
            max="127"
            step="1"
            value="89"
          />

          <label for="env-release">Release (s)</label>
          <output id="env-release-value">12</output>
          <input
            id="env-release"
            data-param="release"
            type="range"
            min="0"
            max="127"
            step="1"
            value="12"
          />
        </fieldset>
      </section>

      <section class="panel">
        <h2>LFO 1</h2>
        <fieldset>
          <label for="lfo1-wave">Waveform</label>
          <select id="lfo1-wave" data-param="lfo1Wave">
            <option value="sine" selected>Sine</option>
            <option value="triangle">Triangle</option>
            <option value="sawtooth">Sawtooth</option>
            <option value="square">Square</option>
          </select>

          <label for="lfo1-target">Target</label>
          <select id="lfo1-target" data-param="lfo1Target">
            <option value="off" selected>Off</option>
            <option value="pitch">Pitch</option>
            <option value="filterCutoff">Filter cutoff</option>
            <option value="osc1Level">Osc 1 level</option>
            <option value="osc2Level">Osc 2 level</option>
          </select>

          <label for="lfo1-rate">Rate (Hz)</label>
          <output id="lfo1-rate-value">4.00</output>
          <input
            id="lfo1-rate"
            data-param="lfo1Rate"
            type="range"
            min="0.01"
            max="20"
            step="0.01"
            value="4.00"
          />

          <label for="lfo1-rate-mode">Rate mode</label>
          <select id="lfo1-rate-mode" data-param="lfo1RateMode">
            <option value="free" selected>Free</option>
            <option value="sync">Sync</option>
          </select>

          <label for="lfo1-division">Division</label>
          <select id="lfo1-division" data-param="lfo1Division">
            <option value="1/1">1/1</option>
            <option value="1/2">1/2</option>
            <option value="1/4" selected>1/4</option>
            <option value="1/8">1/8</option>
            <option value="1/16">1/16</option>
            <option value="1/32">1/32</option>
            <option value="1/4T">1/4T</option>
            <option value="1/8T">1/8T</option>
            <option value="1/16T">1/16T</option>
            <option value="1/4.">1/4.</option>
            <option value="1/8.">1/8.</option>
            <option value="1/16.">1/16.</option>
          </select>

          <label for="lfo1-depth">Depth</label>
          <output id="lfo1-depth-value">0.00</output>
          <input
            id="lfo1-depth"
            data-param="lfo1Depth"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.00"
          />
        </fieldset>
      </section>

      <section class="panel">
        <h2>LFO 2</h2>
        <fieldset>
          <label for="lfo2-wave">Waveform</label>
          <select id="lfo2-wave" data-param="lfo2Wave">
            <option value="sine">Sine</option>
            <option value="triangle" selected>Triangle</option>
            <option value="sawtooth">Sawtooth</option>
            <option value="square">Square</option>
          </select>

          <label for="lfo2-target">Target</label>
          <select id="lfo2-target" data-param="lfo2Target">
            <option value="off" selected>Off</option>
            <option value="pitch">Pitch</option>
            <option value="filterCutoff">Filter cutoff</option>
            <option value="osc1Level">Osc 1 level</option>
            <option value="osc2Level">Osc 2 level</option>
          </select>

          <label for="lfo2-rate">Rate (Hz)</label>
          <output id="lfo2-rate-value">0.50</output>
          <input
            id="lfo2-rate"
            data-param="lfo2Rate"
            type="range"
            min="0.01"
            max="20"
            step="0.01"
            value="0.50"
          />

          <label for="lfo2-rate-mode">Rate mode</label>
          <select id="lfo2-rate-mode" data-param="lfo2RateMode">
            <option value="free" selected>Free</option>
            <option value="sync">Sync</option>
          </select>

          <label for="lfo2-division">Division</label>
          <select id="lfo2-division" data-param="lfo2Division">
            <option value="1/1">1/1</option>
            <option value="1/2">1/2</option>
            <option value="1/4" selected>1/4</option>
            <option value="1/8">1/8</option>
            <option value="1/16">1/16</option>
            <option value="1/32">1/32</option>
            <option value="1/4T">1/4T</option>
            <option value="1/8T">1/8T</option>
            <option value="1/16T">1/16T</option>
            <option value="1/4.">1/4.</option>
            <option value="1/8.">1/8.</option>
            <option value="1/16.">1/16.</option>
          </select>

          <label for="lfo2-depth">Depth</label>
          <output id="lfo2-depth-value">0.00</output>
          <input
            id="lfo2-depth"
            data-param="lfo2Depth"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.00"
          />
        </fieldset>
      </section>

      <section class="panel">
        <h2>Master</h2>
        <fieldset>
          <label for="master-volume">Volume</label>
          <output id="master-volume-value">0.60</output>
          <input
            id="master-volume"
            data-param="masterVolume"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.60"
          />
        </fieldset>
      </section>

      <section class="panel">
        <h2>Effects</h2>
        <fieldset>
          <label for="fx-delay-time">Delay Time</label>
          <output id="fx-delay-time-value">32</output>
          <input
            id="fx-delay-time"
            data-param="fxDelayTime"
            type="range"
            min="0"
            max="127"
            step="1"
            value="32"
          />

          <label for="fx-delay-feedback">Delay Feedback</label>
          <output id="fx-delay-feedback-value">22</output>
          <input
            id="fx-delay-feedback"
            data-param="fxDelayFeedback"
            type="range"
            min="0"
            max="127"
            step="1"
            value="22"
          />

          <label for="fx-delay-mix">Delay Mix</label>
          <output id="fx-delay-mix-value">12</output>
          <input
            id="fx-delay-mix"
            data-param="fxDelayMix"
            type="range"
            min="0"
            max="127"
            step="1"
            value="12"
          />

          <label for="fx-chorus-rate">Chorus Rate</label>
          <output id="fx-chorus-rate-value">26</output>
          <input
            id="fx-chorus-rate"
            data-param="fxChorusRate"
            type="range"
            min="0"
            max="127"
            step="1"
            value="26"
          />

          <label for="fx-chorus-depth">Chorus Depth</label>
          <output id="fx-chorus-depth-value">18</output>
          <input
            id="fx-chorus-depth"
            data-param="fxChorusDepth"
            type="range"
            min="0"
            max="127"
            step="1"
            value="18"
          />

          <label for="fx-chorus-mix">Chorus Mix</label>
          <output id="fx-chorus-mix-value">10</output>
          <input
            id="fx-chorus-mix"
            data-param="fxChorusMix"
            type="range"
            min="0"
            max="127"
            step="1"
            value="10"
          />

          <label for="fx-reverb-size">Reverb Size</label>
          <output id="fx-reverb-size-value">36</output>
          <input
            id="fx-reverb-size"
            data-param="fxReverbSize"
            type="range"
            min="0"
            max="127"
            step="1"
            value="36"
          />

          <label for="fx-reverb-mix">Reverb Mix</label>
          <output id="fx-reverb-mix-value">14</output>
          <input
            id="fx-reverb-mix"
            data-param="fxReverbMix"
            type="range"
            min="0"
            max="127"
            step="1"
            value="14"
          />

          <label for="fx-dist-drive">Distortion Drive</label>
          <output id="fx-dist-drive-value">8</output>
          <input
            id="fx-dist-drive"
            data-param="fxDistDrive"
            type="range"
            min="0"
            max="127"
            step="1"
            value="8"
          />

          <label for="fx-dist-mix">Distortion Mix</label>
          <output id="fx-dist-mix-value">6</output>
          <input
            id="fx-dist-mix"
            data-param="fxDistMix"
            type="range"
            min="0"
            max="127"
            step="1"
            value="6"
          />
        </fieldset>
      </section>
    </main>

    <section id="cc-map-dialog" class="cc-dialog" aria-hidden="true">
      <div class="cc-dialog-panel" role="dialog" aria-modal="true" aria-label="MIDI CC Map">
        <div class="dialog-header">
          <h2>MIDI CC Map</h2>
          <button id="close-cc-map" type="button">Close</button>
        </div>
        <div class="table-wrap">
          <table class="cc-table" aria-label="MIDI CC mapping table">
            <thead>
              <tr>
                <th>CC</th>
                <th>Name</th>
                <th>Target</th>
              </tr>
            </thead>
            <tbody id="cc-map-body"></tbody>
          </table>
        </div>
      </div>
    </section>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
